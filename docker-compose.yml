services:
  whapy-design:
    build: .
    container_name: whapy-design
    restart: always
    ports:
      - "3030:3030"
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-whapy-design-secret-2024}
    volumes:
      - design-data:/opt/whapy-design/data/screenshots
    networks:
      - whapy-net

networks:
  whapy-net:
    driver: bridge

volumes:
  design-data:
